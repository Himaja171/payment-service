apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: production
  labels:
    app: payment-service
spec:
  type: LoadBalancer
  selector:
    app: payment-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: production
    team: devops
